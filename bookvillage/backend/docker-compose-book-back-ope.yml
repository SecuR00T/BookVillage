services:
  db:
    image: mysql:8.4
    container_name: book-village-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-village123!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-book-village-db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-village123!}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - book-village-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-village-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://book-village-db.c7yyi6w0ch43.ap-northeast-2.rds.amazonaws.com:3306/book-village-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: admin_book
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-village123!}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - book-village-net

volumes:
  mysql-data:
  backend-uploads:

networks:
  book-village-net:
    name: book-village-net

