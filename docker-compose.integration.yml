services:
  db:
    image: mysql:8.4
    container_name: book-village-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookvillage_mock}
    ports:
      - "${MYSQL_PORT:-3417}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - book-village-net

  book-village-backend:
    build:
      context: ./bookvillage/backend
      dockerfile: Dockerfile
    container_name: book-village-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-bookvillage_mock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    ports:
      - "${BACKEND_PORT:-19080}:8080"
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - book-village-net

  book-village-frontend:
    build:
      context: ./bookvillage/frontend
      dockerfile: Dockerfile
    container_name: book-village-frontend
    restart: unless-stopped
    depends_on:
      - book-village-backend
    ports:
      - "${FRONTEND_PORT:-19081}:80"
    networks:
      - book-village-net

  admin-backend:
    build:
      context: ../../2.25_admin/admin/backend
      dockerfile: Dockerfile
    container_name: bookvillage-admin-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-bookvillage_mock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    ports:
      - "${ADMIN_BACKEND_PORT:-18081}:18081"
    networks:
      - book-village-net

  admin-frontend:
    build:
      context: ../../2.25_admin/admin/frontend
      dockerfile: Dockerfile
    container_name: bookvillage-admin-frontend
    restart: unless-stopped
    depends_on:
      - admin-backend
    environment:
      BACKEND_PROXY_HOST: admin-backend
      BACKEND_PROXY_PORT: 18081
      NGINX_ENVSUBST_FILTER: BACKEND_PROXY_HOST|BACKEND_PROXY_PORT
    ports:
      - "${ADMIN_FRONTEND_PORT:-18080}:80"
    networks:
      - book-village-net

volumes:
  mysql-data:
  backend-uploads:

networks:
  book-village-net:
    name: book-village-net
