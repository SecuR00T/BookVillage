services:
  db:
    image: mysql:8.4
    container_name: bookchon-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yes24_mock}
    ports:
      - "${MYSQL_PORT:-3417}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - bookchon-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: bookchon-mailhog
    profiles: ["mailhog"]
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - bookchon-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookchon-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-yes24_mock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
    ports:
      - "${BACKEND_PORT:-19080}:8080"
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - bookchon-net

volumes:
  mysql-data:
  backend-uploads:

networks:
  bookchon-net:
    name: bookchon-net


