services:
  db:
    image: mysql:8.4
    container_name: yes24-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yes24_mock}
    ports:
      - "${MYSQL_PORT:-3417}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - yes24-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yes24-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-yes24_mock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    ports:
      - "${BACKEND_PORT:-19080}:8080"
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - yes24-net

volumes:
  mysql-data:
  backend-uploads:

networks:
  yes24-net:
    name: yes24-net

